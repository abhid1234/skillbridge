<!doctype html>

<html><head><meta charset="utf-8"><style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #f7f3ec; color: #211d18;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Charter, Georgia, serif;
    padding: 76px 80px; display: flex; flex-direction: column; justify-content: center;
    position: relative;
  }
  .eyebrow { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 22px; letter-spacing: 0.14em; text-transform: uppercase; color: #7a1f2b; margin-bottom: 26px; }
  h1 { font-size: 104px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; margin-bottom: 26px; }
  .tag { font-size: 40px; font-style: italic; color: #3a342c; margin-bottom: 44px; }
  .chips { display: flex; gap: 16px; }
  .chip { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 24px; padding: 12px 24px; border-radius: 999px; border: 2px solid; }
  .cc { color: #7a1f2b; border-color: #7a1f2b; }
  .ag { color: #3367d6; border-color: #3367d6; }
  .cx { color: #10a37f; border-color: #10a37f; }
  .rule { position: absolute; left: 0; top: 0; width: 16px; height: 630px; background: #7a1f2b; }
</style></head>
<body>
  <div class="rule"></div>
  <div class="eyebrow">Portable agent skills</div>
  <h1>SkillBridge</h1>
  <div class="tag">Write your agent skill once. Run it on any agent.</div>
  <div class="chips">
    <span class="chip cc">Claude Code</span>
    <span class="chip ag">Antigravity</span>
    <span class="chip cx">Codex</span>
  </div>
</body></html>
