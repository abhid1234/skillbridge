name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test
      - name: Verify web build
        run: npm run build:web
      - name: Conformance (lossiness matrix + golden manifest, no drift)
        run: npm run conformance:check
