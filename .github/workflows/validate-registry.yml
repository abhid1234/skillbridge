name: validate-registry

# Validates every skill in registry/ against the SkillBridge format and confirms
# it converts to all harnesses. The job FAILS on conversion *errors* (invalid
# frontmatter, missing required fields, unknown targets) but NOT on lossy
# *warnings* — those are expected and informational (a capability a given harness
# can't represent, a Claude-only override dropped for others, etc.).
#
# The skillbridge CLI already encodes exactly these semantics: it exits 1 when a
# skill has validation/conversion errors and exits 0 when it only emits warnings.
# So this workflow simply runs validate + convert per skill and lets the exit code
# propagate; it does not parse warning text.

on:
  push:
    paths:
      - "registry/**"
      - "packages/cli/**"
      - ".github/workflows/validate-registry.yml"
  pull_request:
    paths:
      - "registry/**"
      - "packages/cli/**"
      - ".github/workflows/validate-registry.yml"

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build the CLI
        working-directory: packages/cli
        run: |
          npm install
          npm run build

      - name: Validate + convert every registry skill
        run: |
          CLI="packages/cli/dist/src/cli.js"
          if [ ! -f "$CLI" ]; then
            echo "::error::CLI build output not found at $CLI"
            exit 1
          fi

          shopt -s nullglob
          fail=0
          count=0
          for dir in registry/*/; do
            [ -f "${dir}skill.sb.md" ] || continue
            count=$((count + 1))
            name="$(basename "$dir")"
            echo "::group::$name"

            # 1) Validate frontmatter. Exits non-zero on schema errors.
            if ! node "$CLI" validate "$dir"; then
              echo "::error file=${dir}skill.sb.md::$name failed validation"
              fail=1
              echo "::endgroup::"
              continue
            fi

            # 2) Convert to all harnesses. Exits non-zero only on conversion
            #    ERRORS; lossy warnings are printed but keep the exit code at 0.
            out="$(mktemp -d)"
            if ! node "$CLI" convert "$dir" --to all --out "$out"; then
              echo "::error file=${dir}skill.sb.md::$name failed conversion (errors, not warnings)"
              fail=1
            fi
            rm -rf "$out"

            echo "::endgroup::"
          done

          if [ "$count" -eq 0 ]; then
            echo "::error::No registry skills found under registry/*/skill.sb.md"
            exit 1
          fi

          echo "Checked $count registry skill(s)."
          exit $fail

      - name: Regenerate registry.gen.js and check it is committed
        # The web playground loads registry/ via web/registry.gen.js (generated by
        # scripts/gen-registry.mjs). If a skill was added/edited without regenerating,
        # the committed file drifts — catch that here.
        working-directory: packages/cli
        run: |
          node scripts/gen-registry.mjs
          if ! git diff --quiet -- ../../web/registry.gen.js; then
            echo "::error::web/registry.gen.js is stale. Run 'node packages/cli/scripts/gen-registry.mjs' and commit the result."
            git --no-pager diff -- ../../web/registry.gen.js
            exit 1
          fi
